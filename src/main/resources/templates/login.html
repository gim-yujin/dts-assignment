<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page('로그인', ~{::section})}">
<body>
<section>
    <h1 class="h4 fw-bold text-center mb-2">로그인</h1>
    <p class="text-secondary text-center mb-4">아이디와 비밀번호를 입력해 주세요.</p>

    <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
        아이디 또는 비밀번호가 올바르지 않습니다.
    </div>
    <div th:if="${param.logout}" class="alert alert-success py-2" role="alert">
        정상적으로 로그아웃되었습니다.
    </div>

    <form th:action="@{/login}" method="post" class="needs-validation" novalidate>
        <div class="mb-3">
            <label for="username" class="form-label">아이디</label>
            <input id="username" name="username" type="text" class="form-control"
                   placeholder="username" required autofocus>
        </div>

        <div class="mb-4">
            <label for="password" class="form-label">비밀번호</label>
            <input id="password" name="password" type="password" class="form-control"
                   placeholder="password" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">로그인</button>
    </form>
</section>
</body>
</html>
