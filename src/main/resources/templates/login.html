<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
<main class="min-vh-100 d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h4 fw-bold text-center mb-2">로그인</h1>
                        <p class="text-secondary text-center mb-4">아이디와 비밀번호를 입력해 주세요.</p>

                        <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
                            아이디 또는 비밀번호가 올바르지 않습니다.
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success py-2" role="alert">
                            정상적으로 로그아웃되었습니다.
                        </div>

                        <form th:action="@{/login}" method="post" class="needs-validation" novalidate>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                            <div class="mb-3">
                                <label for="username" class="form-label">아이디</label>
                                <input id="username" name="username" type="text" class="form-control"
                                       placeholder="username" required autofocus>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label">비밀번호</label>
                                <input id="password" name="password" type="password" class="form-control"
                                       placeholder="password" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">로그인</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
